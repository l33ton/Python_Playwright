name: Playwright Tests
on: [push, pull_request]
permissions:
  contents: read
  checks: write
  pull-requests: write
jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout_code
        uses: actions/checkout@v5

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}
      - name: Install dependencies
        run: |
            pip install -r requirements.txt
            playwright install --with-deps chromium

      - name: Start Database and App
        run: |            
            docker network create smart-garage-net
          
            docker run -d \
              --name mariadb \
              --network smart-garage-net \
              -e MYSQL_ROOT_PASSWORD=rootpass \
              -e MYSQL_DATABASE=smart_garage \
              -p 3307:3306 \
              dave0a/setupdocker-mariadb:latest
    
            sleep 5

            docker run -d \
              --name app \
              --network smart-garage-net \
              -p 8081:8081 \
              -e SPRING_DATASOURCE_URL=jdbc:mariadb://mariadb:3306/smart_garage \
              -e SPRING_DATASOURCE_USERNAME=root \
              -e SPRING_DATASOURCE_PASSWORD=rootpass \
              dave0a/setupdocker-app:latest

            sleep 5

      - name: Wait for App
        run: sleep 5

      - name: Run Playwright tests
        run: |
             sleep 5 
             pytest tests/web/auth_setup.py::test_save_auth_state --tracing retain-on-failure
             pytest --tracing retain-on-failure --maxfail=3 --junitxml=results.xml
        env:
            PYTHONPATH: .
            COMMON_PASSWORD: ${{ secrets.COMMON_PASSWORD }}
            
      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
            files: "results.xml"